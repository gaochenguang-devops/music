<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundCargo Server</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; background:#e8eff2; color:#19252f; }
    body { max-width: 980px; margin: 0 auto; padding: 28px; }
    main { display:grid; grid-template-columns: 1fr 300px; gap:18px; }
    section { background:#fafcfd; border:1px solid #d6e1e6; border-radius:14px; padding:20px; box-shadow:0 4px 18px #142b3918; }
    h1 { margin:0 0 20px; font-size:25px; } h2 { margin:0 0 12px; font-size:18px; }
    button, input, select { border:1px solid #bcdee1; border-radius:17px; background:#e8f6f7; padding:9px 14px; color:#19252f; }
    button { cursor:pointer; } button:hover { background:#d3eff0; } .primary { background:#0eb3c5; color:white; }
    .controls { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0; }
    .track { display:flex; justify-content:space-between; gap:10px; padding:10px; border-radius:8px; cursor:pointer; }
    .track:hover, .track.active { background:#def7f6; } .muted { color:#70808b; font-size:13px; }
    #lyrics { min-height:260px; white-space:pre-wrap; line-height:1.8; } #error { color:#b44b55; }
    @media (max-width: 760px) { body{padding:14px} main{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <h1>SoundCargo <span class="muted">远程播放器</span></h1>
  <main>
    <section><h2 id="now">等待播放</h2><div id="meta" class="muted">服务器音乐库</div>
      <div class="controls"><button onclick="call('previous')">上一曲</button><button class="primary" onclick="call('play')">播放</button><button onclick="call('pause')">暂停</button><button onclick="call('stop')">停止</button><button onclick="call('next')">下一曲</button></div>
      <input id="seek" type="range" min="0" max="0" value="0" step="0.1" style="width:100%" onchange="post('/api/player/seek',{value:+this.value})">
      <div class="controls"><label>音量 <input id="volume" type="range" min="0" max="1" step="0.01" value="0.75" onchange="post('/api/player/volume',{value:+this.value})"></label><label>倍速 <select id="speed" onchange="post('/api/player/speed',{value:+this.value})"><option>0.5</option><option>0.75</option><option selected>1</option><option>1.25</option><option>1.5</option><option>2</option></select></label><select id="mode" onchange="post('/api/player/mode',{value:this.value})"><option value="Sequential">顺序播放</option><option value="RepeatOne">单曲循环</option><option value="RepeatAll">列表循环</option><option value="Shuffle">随机播放</option></select></div>
      <p id="error"></p><h2>歌词</h2><div id="lyrics" class="muted">暂无歌词</div>
    </section>
    <section><h2>播放列表</h2><div id="tracks" class="muted">加载中...</div></section>
  </main>
  <script>
    let state;
    async function post(url, body) { const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:body?JSON.stringify(body):'{}'}); if(r.ok) render(await r.json()); }
    async function call(action) { await post('/api/player/'+action); }
    async function render(s) { state=s; const t=s.current==null?null:s.tracks[s.current]; document.querySelector('#now').textContent=t?t.title:'等待播放'; document.querySelector('#meta').textContent=t?`${t.artist} · ${t.album}`:'服务器音乐库'; document.querySelector('#volume').value=s.volume; document.querySelector('#speed').value=s.speed; document.querySelector('#mode').value=s.mode; document.querySelector('#error').textContent=s.error||''; const tracks=document.querySelector('#tracks'); tracks.innerHTML=''; s.tracks.forEach(x=>{const e=document.createElement('div');e.className='track '+(x.index===s.current?'active':'');e.innerHTML=`<span>${x.title}<small class="muted"><br>${x.artist}</small></span><span class="muted">${Math.floor(x.duration_ms/60000)}:${String(Math.floor(x.duration_ms/1000)%60).padStart(2,'0')}</span>`;e.onclick=()=>post('/api/player/track/'+x.index);tracks.append(e)}); const l=s.current==null?null:await fetch('/api/lyrics/'+s.current); if(l&&l.ok){const lyric=await l.json();document.querySelector('#lyrics').textContent=lyric.lines.map(x=>x.text).join('\n')} }
    fetch('/api/state').then(r=>r.json()).then(render); const ws=new WebSocket(`ws://${location.host}/api/events`); ws.onmessage=e=>render(JSON.parse(e.data));
  </script>
</body></html>
